<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1"/>
  <meta name="theme-color" content="#6d28d9"/>

  <!-- SEO -->
  <title>autoflow — Algeria's #1 Logistics & E-Commerce Automation Platform</title>
  <meta name="description" content="autoflow is the all-in-one order management and shipping automation platform for Algerian e-commerce. Connect Yalidine, ZR Express, DHL, FedEx and more."/>
  <meta name="keywords" content="autoflow, logistics Algeria, order management, Yalidine API, ZR Express, e-commerce automation, shipping Algeria, COD management"/>
  <meta name="author" content="autoflow"/>
  <meta name="robots" content="index, follow"/>
  <link rel="canonical" href="https://autoflow.dz/"/>

  <!-- Open Graph -->
  <meta property="og:type" content="website"/>
  <meta property="og:url" content="https://autoflow.dz/"/>
  <meta property="og:title" content="autoflow — Algeria's #1 Logistics Platform"/>
  <meta property="og:description" content="Automate your e-commerce logistics with autoflow. Connect every carrier, manage every order, grow every day."/>
  <meta property="og:image" content="/og-image.png"/>

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image"/>
  <meta name="twitter:title" content="autoflow — Algeria's #1 Logistics Platform"/>

  <meta name="twitter:image" content="/og-image.png"/>

  <!-- PWA -->
  <link rel="manifest" href="/manifest.json"/>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg"/>
  <link rel="apple-touch-icon" href="/logo-icon.png"/>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,700;12..96,800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
  <script>
    // Register Service Worker for push notifications
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js', { scope: '/' })
          .then(r => console.log('[SW] Registered:', r.scope))
          .catch(e => console.warn('[SW] Registration failed:', e));
      });
    }
  </script>
</body>
</html>
